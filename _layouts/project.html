---
layout: default
---

<article class="project-page">
  <div class="container">
    <h1>{{ page.title }}</h1>

    {% if page.image %}
      <img src="{{ page.image | relative_url }}" alt="{{ page.title }}" class="project-hero">
    {% endif %}

    {% if page.summary %}
      <p class="summary">{{ page.summary }}</p>
    {% endif %}

    <div class="content">
      {{ content }}
    </div>

    {% if page.link %}
      <p><a href="{{ page.link }}" class="btn">View Repository</a></p>
    {% endif %}
  </div>
</article>
