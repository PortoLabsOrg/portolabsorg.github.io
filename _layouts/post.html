---
layout: default
---

<article class="post">
  <div class="container">
    <h1>{{ page.title }}</h1>
    <p class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">
        {{ page.date | date: "%B %d, %Y" }}
      </time>
      {% if page.author %} — {{ page.author }}{% endif %}
    </p>

    <div class="post-content">
      {{ content }}
    </div>
  </div>
</article>
